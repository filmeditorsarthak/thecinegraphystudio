<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AECINESTUDIOPRO — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070a;
  --card:rgba(14,14,18,0.95);
  --s:rgba(255,255,255,0.05);
  --sh:rgba(255,255,255,0.08);
  --b:rgba(255,255,255,0.08);
  --bf:rgba(10,132,255,0.55);
  --t:#f2f2f5;
  --m:rgba(242,242,245,0.42);
  --a:#0a84ff;
  --ag:rgba(10,132,255,0.22);
  --err:#ff453a;
  --ok:#30d158;
  --r:13px;
}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',-apple-system,sans-serif;color:var(--t)}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 55% 45% at 15% 15%,rgba(10,132,255,0.11) 0%,transparent 65%),
             radial-gradient(ellipse 45% 55% at 85% 85%,rgba(94,92,230,0.09) 0%,transparent 65%);
  pointer-events:none}

.page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

.card{width:100%;max-width:385px;background:var(--card);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid var(--b);border-radius:22px;padding:42px 34px 38px;
  box-shadow:0 20px 60px rgba(0,0,0,0.75);animation:up .5s cubic-bezier(.16,1,.3,1) both}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* Brand */
.brand{text-align:center;margin-bottom:30px}
.logo{width:48px;height:48px;background:linear-gradient(135deg,#0a84ff,#5e5ce6);border-radius:13px;
  display:inline-flex;align-items:center;justify-content:center;margin-bottom:13px;
  box-shadow:0 5px 18px rgba(10,132,255,0.38)}
.logo svg{width:22px;height:22px}
.bname{font-size:10.5px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--m);margin-bottom:4px}
.bhead{font-size:21px;font-weight:600;letter-spacing:-.3px}

/* Tabs */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,0.04);border:1px solid var(--b);border-radius:11px;padding:3px;margin-bottom:22px}
.tab{flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;color:var(--m);border-radius:8px;cursor:pointer;transition:all .2s;user-select:none}
.tab.on{background:rgba(255,255,255,0.09);color:var(--t);box-shadow:0 1px 4px rgba(0,0,0,0.4)}

/* Alert banner */
.alert{display:none;padding:11px 13px;border-radius:10px;font-size:13px;margin-bottom:14px;line-height:1.45}
.alert.show{display:block;animation:up .2s ease}
.alert.err{background:rgba(255,69,58,0.1);border:1px solid rgba(255,69,58,0.28);color:#ff6b63}
.alert.ok{background:rgba(48,209,88,0.1);border:1px solid rgba(48,209,88,0.28);color:#34c85a}
.alert.info{background:rgba(10,132,255,0.1);border:1px solid rgba(10,132,255,0.25);color:#5aa9ff}

/* Fields */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--m);margin-bottom:6px}
.iw{position:relative}
.ii{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.2);pointer-events:none;display:flex;align-items:center}
input[type=email],input[type=password],input[type=text]{
  width:100%;padding:12px 12px 12px 39px;background:var(--s);border:1px solid var(--b);
  border-radius:var(--r);color:var(--t);font:500 14.5px/1 'DM Sans',sans-serif;
  outline:none;transition:border-color .18s,box-shadow .18s,background .18s;
  caret-color:var(--a);-webkit-appearance:none}
input::placeholder{color:rgba(255,255,255,0.17)}
input:focus{border-color:var(--bf);background:var(--sh);box-shadow:0 0 0 3px var(--ag)}
input.bad{border-color:var(--err)!important;box-shadow:none!important}
.ferr{font-size:11.5px;color:var(--err);margin-top:4px;display:none}
.ferr.on{display:block}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.2);padding:2px;
  display:flex;align-items:center;transition:color .18s}
.eye:hover{color:rgba(255,255,255,0.45)}

/* Forgot */
.forgot{text-align:right;margin:-3px 0 16px}
.forgot a{font-size:12.5px;color:var(--a);text-decoration:none;opacity:.8}
.forgot a:hover{opacity:1}

/* Buttons */
.btn{width:100%;padding:13px;border:none;border-radius:var(--r);font:600 14.5px 'DM Sans',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  min-height:47px;transition:transform .14s,box-shadow .18s,opacity .18s;position:relative}
.btn:active:not(:disabled){transform:scale(.986)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-main{background:var(--a);color:#fff;box-shadow:0 4px 16px rgba(10,132,255,0.42);margin-bottom:14px}
.btn-main:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 7px 22px rgba(10,132,255,0.52)}
.btn-g{background:var(--s);border:1px solid var(--b);color:var(--t)}
.btn-g:hover:not(:disabled){background:var(--sh);border-color:rgba(255,255,255,0.16);transform:translateY(-1px)}
.spin{width:17px;height:17px;border:2px solid rgba(255,255,255,0.28);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none}
.btn.loading .btn-txt{display:none}
.btn.loading .spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Divider */
.or{display:flex;align-items:center;gap:10px;margin:14px 0}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--b)}
.or span{font-size:11.5px;color:var(--m)}

/* Success */
.sv{display:none;text-align:center;padding:8px 0;animation:up .4s ease}
.sc{width:58px;height:58px;background:rgba(48,209,88,0.11);border:1.5px solid rgba(48,209,88,0.3);
  border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.st{font-size:19px;font-weight:600;margin-bottom:5px}
.ss{font-size:13px;color:var(--m)}

/* Debug */
.debug{margin-top:14px;padding:11px;background:rgba(255,255,255,0.03);border:1px solid var(--b);
  border-radius:10px;font-size:11.5px;color:var(--m);font-family:monospace;
  word-break:break-all;line-height:1.55;display:none}
.debug.on{display:block}

/* Toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);
  background:rgba(18,18,22,0.96);border:1px solid var(--b);border-radius:11px;
  padding:10px 16px;font-size:13px;color:var(--t);
  backdrop-filter:blur(20px);box-shadow:0 6px 22px rgba(0,0,0,0.5);
  z-index:999;opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);
  pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="page">
 <div class="card">

  <!-- Brand -->
  <div class="brand">
   <div class="logo">
    <svg viewBox="0 0 24 24" fill="none"><path d="M5 3l14 9L5 21V3z" fill="white"/></svg>
   </div>
   <div class="bname">AECINESTUDIOPRO</div>
   <div class="bhead" id="bhead">Welcome back</div>
  </div>

  <!-- FORM -->
  <div id="fv">
   <div class="tabs">
    <div class="tab on" id="t-in" onclick="sw('login')">Sign In</div>
    <div class="tab"    id="t-up" onclick="sw('signup')">Sign Up</div>
   </div>

   <div class="alert" id="alert"></div>

   <!-- Email -->
   <div class="field">
    <label>Email</label>
    <div class="iw">
     <span class="ii"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
     <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="ferr" id="e-err">Valid email daalo.</div>
   </div>

   <!-- Password -->
   <div class="field">
    <label>Password</label>
    <div class="iw">
     <span class="ii"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
     <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
     <button class="eye" type="button" onclick="eyeToggle()">
      <svg id="eyesvg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
     </button>
    </div>
    <div class="ferr" id="p-err">Password 6+ characters ka hona chahiye.</div>
   </div>

   <!-- Confirm (signup) -->
   <div class="field" id="cf" style="display:none">
    <label>Confirm Password</label>
    <div class="iw">
     <span class="ii"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
     <input type="password" id="cpw" placeholder="••••••••">
    </div>
    <div class="ferr" id="c-err">Passwords match nahi kar rahe.</div>
   </div>

   <!-- Forgot (login) -->
   <div class="forgot" id="fgt"><a href="#" onclick="forgot(event)">Forgot password?</a></div>

   <!-- Submit -->
   <button class="btn btn-main" id="sb" onclick="doAuth()">
    <span class="btn-txt">Sign In</span>
    <div class="spin"></div>
   </button>

   <div class="or"><span>or continue with</span></div>

   <button class="btn btn-g" onclick="doGoogle()">
    <svg width="16" height="16" viewBox="0 0 24 24">
     <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
     <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
     <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
     <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
   </button>

   <div class="debug" id="dbg"></div>
  </div><!-- /fv -->

  <!-- SUCCESS -->
  <div class="sv" id="sv">
   <div class="sc"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#30d158" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
   <div class="st">Login Ho Gaya! 🎬</div>
   <div class="ss" id="su"></div>
  </div>

 </div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script type="module">
 import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
 import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,
        GoogleAuthProvider,signInWithPopup,sendPasswordResetEmail,
        fetchSignInMethodsForEmail}
   from'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

 const app=initializeApp({
  apiKey:"AIzaSyA_emfy09LNRzT2vhzMjeJbV1uD33sKMSg",
  authDomain:"aecinestudiopro07.firebaseapp.com",
  projectId:"aecinestudiopro07",
  storageBucket:"aecinestudiopro07.firebasestorage.app",
  messagingSenderId:"893339964410",
  appId:"1:893339964410:web:42e5cdf89649379c378a43",
  measurementId:"G-P60HTPD7VS"
 });
 const auth=getAuth(app);
 const gp=new GoogleAuthProvider();
 window.__fb={auth,gp,signInWithEmailAndPassword,createUserWithEmailAndPassword,
              signInWithPopup,sendPasswordResetEmail,fetchSignInMethodsForEmail};
 window.__fbReady=true;
 console.log('✅ Firebase OK');
</script>

<script>
let mode='login';

// ── helpers ──────────────────────────────────────────────────
function $id(id){return document.getElementById(id)}
function showAlert(msg,type='err'){
  const el=$id('alert');
  el.textContent=msg; el.className='alert '+type+' show';
}
function hideAlert(){$id('alert').className='alert'}
function setLoad(v){const b=$id('sb');b.classList.toggle('loading',v);b.disabled=v}
function clearBad(){
  ['email','pw','cpw'].forEach(id=>{const el=$id(id);if(el)el.classList.remove('bad')});
  ['e-err','p-err','c-err'].forEach(id=>{const el=$id(id);if(el)el.classList.remove('on')});
}
function bad(inp,err){$id(inp).classList.add('bad');$id(err).classList.add('on')}
function toast(msg){
  const t=$id('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),3500);
}
function debug(msg){const d=$id('dbg');d.textContent=msg;d.classList.add('on')}

// Firebase error → Hinglish
function ferr(code){
  const map={
    'auth/user-not-found':       '❌ Account nahi mila. Pehle Sign Up karo.',
    'auth/wrong-password':       '❌ Password galat hai.',
    'auth/invalid-credential':   '❌ Email ya password galat hai. Sign Up tab se naya account banao.',
    'auth/email-already-in-use': '❌ Yeh email already registered hai. Sign In karo.',
    'auth/weak-password':        '❌ Password 6+ characters ka hona chahiye.',
    'auth/invalid-email':        '❌ Email format sahi nahi hai.',
    'auth/too-many-requests':    '⏳ Zyada attempts. 5 min baad try karo.',
    'auth/network-request-failed':'📡 Internet check karo.',
    'auth/operation-not-allowed':'⚙️ Firebase Console mein Email/Password enable nahi hai!',
    'auth/popup-blocked':        '🚫 Popup block hua. Browser settings mein allow karo.',
    'auth/popup-closed-by-user': 'Google sign-in cancel kiya.',
  };
  return map[code]||('Error code: '+code);
}

// ── tab switch ────────────────────────────────────────────────
function sw(m){
  mode=m;
  $id('t-in').classList.toggle('on',m==='login');
  $id('t-up').classList.toggle('on',m==='signup');
  $id('cf').style.display=m==='signup'?'block':'none';
  $id('fgt').style.display=m==='login'?'block':'none';
  $id('sb').querySelector('.btn-txt').textContent=m==='login'?'Sign In':'Account Banao';
  $id('bhead').textContent=m==='login'?'Welcome back':'Account banao';
  clearBad(); hideAlert(); $id('dbg').classList.remove('on');
}

// ── eye toggle ────────────────────────────────────────────────
function eyeToggle(){
  const inp=$id('pw'),svg=$id('eyesvg');
  if(inp.type==='password'){
    inp.type='text';
    svg.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type='password';
    svg.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// ── success screen ────────────────────────────────────────────
function success(email){
  $id('fv').style.display='none';
  $id('sv').style.display='block';
  $id('su').textContent='Logged in as: '+email;
  $id('bhead').textContent='Studio mein aao! 🎬';
}

// ── MAIN AUTH ─────────────────────────────────────────────────
async function doAuth(){
  clearBad(); hideAlert();

  // Wait for firebase if needed
  if(!window.__fbReady){
    await new Promise(r=>setTimeout(r,1500));
    if(!window.__fb){showAlert('Firebase load nahi hua. Page refresh karo.','err');return}
  }

  const email=$id('email').value.trim();
  const pw=$id('pw').value;
  const cpw=$id('cpw').value;

  // Validate
  let ok=true;
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){bad('email','e-err');ok=false}
  if(pw.length<6){bad('pw','p-err');ok=false}
  if(mode==='signup'&&pw!==cpw){bad('cpw','c-err');ok=false}
  if(!ok)return;

  setLoad(true);
  const{auth,signInWithEmailAndPassword,createUserWithEmailAndPassword}=window.__fb;

  try{
    let res;
    if(mode==='login'){
      res=await signInWithEmailAndPassword(auth,email,pw);
    } else {
      res=await createUserWithEmailAndPassword(auth,email,pw);
    }
    success(res.user.email);
  } catch(e){
    console.error(e);
    let msg=ferr(e.code);

    // Smart hint: agar login fail hua toh signup suggest karo
    if(mode==='login' && (e.code==='auth/user-not-found'||e.code==='auth/invalid-credential')){
      msg+=' → "Sign Up" tab pe jao aur pehle account banao.';
    }

    showAlert(msg,'err');
    debug('Code: '+e.code+'\nMessage: '+e.message);
  } finally{
    setLoad(false);
  }
}

// ── GOOGLE ────────────────────────────────────────────────────
async function doGoogle(){
  hideAlert();
  if(!window.__fb){await new Promise(r=>setTimeout(r,1500))}
  if(!window.__fb){showAlert('Firebase load nahi hua.','err');return}
  try{
    const{auth,gp,signInWithPopup}=window.__fb;
    const res=await signInWithPopup(auth,gp);
    success(res.user.email);
  } catch(e){
    if(e.code!=='auth/popup-closed-by-user'){
      showAlert(ferr(e.code),'err');
      debug('Google error code: '+e.code);
    }
  }
}

// ── FORGOT PASSWORD ───────────────────────────────────────────
async function forgot(e){
  e.preventDefault();
  const email=$id('email').value.trim();
  if(!email){bad('email','e-err');return}
  if(!window.__fb){showAlert('Firebase load nahi hua.','err');return}
  try{
    await window.__fb.sendPasswordResetEmail(window.__fb.auth,email);
    showAlert('✅ Reset link bhej diya: '+email,'ok');
  } catch(err){
    showAlert(ferr(err.code),'err');
  }
}

// Enter key
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!['BUTTON','A'].includes(document.activeElement.tagName))doAuth();
});
</script>
</body>
</html>
