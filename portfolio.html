<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO | THE.CINEGRAPHYSTUDIO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #02060c;
            --surface: #0a111d;
            --surface-light: #162133;
            --primary: #0070f3;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: #fff; overflow-y: auto; line-height: 1.6; }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 20px 6%; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); 
            background: rgba(2, 6, 12, 0.8); 
        }

        .nav-btn { 
            background: var(--surface-light); border: 1px solid var(--border); color: white; 
            padding: 10px 20px; border-radius: 12px; text-decoration: none; 
            font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; 
        }
        .nav-btn:hover { background: white; color: black; }

        .contact-group { display: flex; gap: 12px; }
        .contact-link { 
            background: var(--surface-light); border: 1px solid var(--border); 
            padding: 10px 22px; border-radius: 12px; color: #fff; 
            text-decoration: none; font-weight: 700; font-size: 0.85rem; 
            display: flex; align-items: center; gap: 10px; transition: 0.4s; 
        }
        .contact-link:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-3px); }

        /* --- HERO --- */
        .hero { padding: 160px 5% 60px; text-align: center; }
        .hero h1 { font-size: 3.5rem; letter-spacing: -2px; margin-bottom: 10px; font-weight: 800; }
        .hero span { color: var(--primary); }

        /* --- GRID --- */
        .container { padding: 0 6% 100px; }
        .section-header { 
            display: flex; align-items: center; gap: 20px; margin-bottom: 40px; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 800; color: var(--primary); font-size: 0.9rem;
        }
        .line { flex-grow: 1; height: 1px; background: var(--border); }

        .grid-horizontal { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 80px; }
        .grid-reels { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .video-card:hover { border-color: var(--primary); transform: scale(1.02); }

        .video-box { position: relative; width: 100%; background: #000; cursor: pointer; }
        video { width: 100%; display: block; transition: transform 0.6s ease; will-change: transform; }
        .video-card:hover video { transform: scale(1.05); }
        
        .v-overlay {
            position: absolute; top: 15px; left: 0; width: 100%; 
            display: flex; justify-content: center; gap: 10px; 
            z-index: 10; opacity: 0; transition: 0.3s;
        }
        .video-card:hover .v-overlay { opacity: 1; }
        
        .v-btn { 
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255,255,255,0.1); 
            color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); 
            font-size: 0.85rem; transition: 0.2s; 
        }
        .v-btn:hover { background: var(--primary); transform: scale(1.1); }

        .info-box { padding: 25px; }
        .info-box h3 { color: var(--primary); margin-bottom: 8px; font-size: 1.2rem; text-transform: uppercase; }
        .info-box p { color: var(--text-dim); font-size: 0.85rem; }

        footer { text-align: center; padding: 60px; border-top: 1px solid var(--border); color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-btn"><i class="fas fa-arrow-left"></i> Back To Main</a>
        <div class="contact-group">
            <a href="https://wa.me/9325616077" target="_blank" class="contact-link"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="https://instagram.com/sarthak_mache_07" target="_blank" class="contact-link"><i class="fab fa-instagram"></i> Instagram</a>
        </div>
    </nav>

    <header class="hero">
        <h1>PORTFOLIO<span> STUDIO</span></h1>
        <p style="color: var(--text-dim);">Sarthak Mache | Professional Video Editor</p>
    </header>

    <div class="container">
        <div class="section-header"><span>01 // Horizontal Projects</span> <div class="line"></div></div>
        <div class="grid-horizontal" id="horizontal-container"></div>

        <div class="section-header"><span>02 // Viral Reels Grid</span> <div class="line"></div></div>
        <div class="grid-reels" id="reels-container"></div>
    </div>

    <footer>THE.CINEGRAPHYSTUDIO // 2026</footer>

    <script>
        // Power Engine Config - individual paths for Reels
        const CONFIG = {
            horizontal: [
                { title: 'Project #1', desc: 'Elite Motion Graphics Cut.', src: 'ASSETS/VIDEO/HORIZ_1.MP4' },
                { title: 'Project #2', desc: 'Professional SaaS Animation.', src: 'ASSETS/VIDEO/HORIZ_2.MP4' },
                { title: 'Project #3', desc: 'Cinematic Brand Film.', src: 'ASSETS/VIDEO/HORIZ_3.MP4' }
            ],
            reels: [
                { title: 'REEL_1', desc: 'Social Media Edit.', src: 'ASSETS/VIDEO/REEL_1.MP4' },
                { title: 'REEL_2', desc: 'Viral Content Cut.', src: 'ASSETS/VIDEO/REEL_2.MP4' },
                { title: 'REEL_3', desc: 'Dynamic Motion Reel.', src: 'ASSETS/VIDEO/REEL_3.MP4' },
                { title: 'REEL_4', desc: 'Engagement Booster.', src: 'ASSETS/VIDEO/REEL_4.MP4' },
                { title: 'REEL_5', desc: 'Aesthetic Visuals.', src: 'ASSETS/VIDEO/REEL_5.MP4' },
                { title: 'REEL_6', desc: 'Fast-paced Transition.', src: 'ASSETS/VIDEO/REEL_6.MP4' },
                { title: 'REEL_7', desc: 'Trending Style Edit.', src: 'ASSETS/VIDEO/REEL_7.MP4' },
                { title: 'REEL_8', desc: 'Cinematic Reel.', src: 'ASSETS/VIDEO/REEL_8.MP4' }
            ]
        };

        // UI Generator
        function initGallery() {
            const hContainer = document.getElementById('horizontal-container');
            const rContainer = document.getElementById('reels-container');

            // Load Horizontal
            CONFIG.horizontal.forEach(item => {
                hContainer.innerHTML += createCard(item.title, item.desc, item.src, false);
            });

            // Load Reels from individual path array
            CONFIG.reels.forEach(reel => {
                rContainer.innerHTML += createCard(reel.title, reel.desc, reel.src, true);
            });
        }

        function createCard(title, desc, src, isReel) {
            const style = isReel ? 'style="aspect-ratio: 9/16; object-fit: cover;"' : '';
            return `
            <div class="video-card">
                <div class="video-box" onmouseenter="pEngine(this, true)" onmouseleave="pEngine(this, false)">
                    <div class="v-overlay">
                        <button class="v-btn" onclick="vR(this)"><i class="fas fa-redo"></i></button>
                        <button class="v-btn" onclick="vF(this)"><i class="fas fa-expand"></i></button>
                    </div>
                    <video loop muted playsinline preload="metadata" ${style}><source src="${src}" type="video/mp4"></video>
                </div>
                <div class="info-box"><h3>${title}</h3><p>${desc}</p></div>
            </div>`;
        }

        // Playback Engine
        async function pEngine(el, active) {
            const v = el.querySelector('video');
            if (active) {
                v.muted = false;
                try {
                    await v.play();
                } catch (err) {
                    v.muted = true;
                    v.play();
                }
            } else {
                v.pause();
                v.muted = true;
            }
        }

        function vR(b) {
            const v = b.closest('.video-box').querySelector('video');
            v.currentTime = 0;
            v.muted = false;
            v.play();
        }

        function vF(b) {
            const v = b.closest('.video-box').querySelector('video');
            if(v.requestFullscreen) v.requestFullscreen();
            else if(v.webkitRequestFullscreen) v.webkitRequestFullscreen();
            v.muted = false;
            v.play();
        }

        initGallery();

        document.addEventListener('contextmenu', e => {
            if (e.target.tagName === 'VIDEO') e.preventDefault();
        });
    </script>
</body>
</html>
